<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - {{BrandName}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fafafa;
        }
        .card p.sub {
            color: #a1a1aa;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .tabs {
            display: flex;
            gap: 0.25rem;
            background: #0f0f14;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 0.25rem;
            margin-bottom: 1.5rem;
        }
        .tab {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: transparent;
            color: #a1a1aa;
            font-size: 0.85rem;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .tab.active { background: #27272a; color: #fafafa; }
        .field {
            text-align: left;
            margin-bottom: 1rem;
        }
        .field label {
            display: block;
            font-size: 0.8rem;
            color: #a1a1aa;
            margin-bottom: 0.35rem;
        }
        .input {
            width: 100%;
            padding: 0.7rem 0.85rem;
            background: #0f0f14;
            border: 1px solid #27272a;
            border-radius: 8px;
            color: #fafafa;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .input:focus { border-color: #3b82f6; }
        .input.otp {
            text-align: center;
            letter-spacing: 0.5rem;
            font-size: 1.4rem;
            font-weight: 600;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #1e3a5f; cursor: not-allowed; }
        .btn-ghost {
            background: transparent;
            border: 1px solid #27272a;
            color: #e4e4e7;
        }
        .btn-ghost:hover { background: #27272a; }
        .divider {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin: 1.25rem 0;
            color: #52525b;
            font-size: 0.75rem;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background: #27272a;
        }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .notice {
            background: #064e3b;
            border: 1px solid #065f46;
            color: #6ee7b7;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .link {
            display: block;
            margin-top: 1.5rem;
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
            background: none;
            border: none;
            cursor: pointer;
            width: 100%;
        }
        .link:hover { text-decoration: underline; }
        .hidden { display: none !important; }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff4;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Sign In</h1>
        <p class="sub" id="subtitle">Sign in to your account</p>
        <div class="error" id="error"></div>

        <div class="tabs">
            <button class="tab active" id="tabPassword" onclick="switchTab('password')">Email &amp; Password</button>
            <button class="tab" id="tabPasskey" onclick="switchTab('passkey')">Passkey</button>
        </div>

        <!-- Email + password -->
        <div id="panePassword">
            <!-- Step 1: credentials -->
            <div id="stepCreds">
                <div class="field">
                    <label for="email" id="emailLabel">Email</label>
                    <input class="input" id="email" type="email" autocomplete="username" placeholder="you@example.com">
                </div>
                <div class="field">
                    <label for="password" id="passwordLabel">Password</label>
                    <input class="input" id="password" type="password" autocomplete="current-password" placeholder="••••••••">
                </div>
                <button class="btn btn-primary" id="credsBtn" onclick="submitCreds()">
                    <span class="spinner" id="credsSpinner"></span>
                    <span id="credsText">Continue</span>
                </button>
                <button class="link" id="forgotBtn" onclick="forgotPassword()">Forgot your password?</button>
                <div id="forgotConfirm" class="hidden" style="margin-top:1rem;">
                    <p id="forgotPrompt" style="font-size:0.875rem;color:#a1a1aa;margin-bottom:0.75rem;"></p>
                    <button class="btn btn-primary" id="forgotSendBtn" onclick="sendForgot()">Send reset link</button>
                    <button class="link" id="forgotCancel" onclick="cancelForgot()">Cancel</button>
                </div>
            </div>

            <!-- Step 2: OTP -->
            <div id="stepOtp" class="hidden">
                <p class="sub"><span id="otpSentPre">We sent a 6-digit code to </span><strong id="otpEmail"></strong><span id="otpSentPost">. Enter it below.</span></p>
                <div class="field">
                    <label for="otp" id="otpLabel">Verification code</label>
                    <input class="input otp" id="otp" inputmode="numeric" maxlength="6" autocomplete="one-time-code" placeholder="••••••">
                </div>
                <button class="btn btn-primary" id="otpBtn" onclick="submitOtp()">
                    <span class="spinner" id="otpSpinner"></span>
                    <span id="otpText">Verify &amp; sign in</span>
                </button>
                <button class="link" id="resendBtn" onclick="resendOtp()">Resend code</button>
                <button class="link" id="backToCredsBtn" onclick="backToCreds()">← Use a different account</button>
            </div>
        </div>

        <!-- Passkey -->
        <div id="panePasskey" class="hidden">
            <button class="btn btn-primary" id="loginBtn" onclick="startLogin()">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Sign in with Passkey</span>
            </button>
        </div>

        <a id="registerLink" href="/register.html" class="link">Don't have an account? Register</a>
        <div style="margin-top:18px;text-align:center;font-size:13px;opacity:.7" id="langBar"></div>
    </div>

    <script src="https://unpkg.com/@simplewebauthn/browser@11/dist/bundle/index.umd.min.js"></script>
    <script>
        const { startAuthentication } = SimpleWebAuthnBrowser;

        // ── i18n ──────────────────────────────────────────────────────────
        const I18N = {
          en: {title:"Sign In",subtitle:"Sign in to your account",tabPassword:"Email & Password",tabPasskey:"Passkey",emailLabel:"Email",passwordLabel:"Password",credsText:"Continue",forgotBtn:"Forgot your password?",otpSentPre:"We sent a 6-digit code to ",otpSentPost:". Enter it below.",otpLabel:"Verification code",otpText:"Verify & sign in",backToCredsBtn:"← Use a different account",btnText:"Sign in with Passkey",registerLink:"Don't have an account? Register",resendBtn:"Resend code",resendSent:"A new code is on its way.",forgotConfirmPre:"Send a reset link to ",forgotConfirmPost:"?",forgotSendBtn:"Send reset link",forgotCancel:"Cancel",forgotNeedEmail:"Enter your email above first.",forgotSent:"If an account exists for that email, a reset link is on its way."},
          fa: {title:"ورود",subtitle:"به حساب خود وارد شوید",tabPassword:"ایمیل و گذرواژه",tabPasskey:"کلید عبور",emailLabel:"ایمیل",passwordLabel:"گذرواژه",credsText:"ادامه",forgotBtn:"گذرواژه‌تان را فراموش کرده‌اید؟",otpSentPre:"یک کد ۶ رقمی به ",otpSentPost:" فرستادیم. آن را وارد کنید.",otpLabel:"کد تأیید",otpText:"تأیید و ورود",backToCredsBtn:"← استفاده از حسابی دیگر",btnText:"ورود با کلید عبور",registerLink:"حساب ندارید؟ ثبت‌نام کنید",resendBtn:"ارسال دوبارهٔ کد",resendSent:"اگر کدتان منقضی شده، کد تازه‌ای فرستادیم.",forgotConfirmPre:"ارسال پیوند بازنشانی به ",forgotConfirmPost:"؟",forgotSendBtn:"ارسال پیوند بازنشانی",forgotCancel:"انصراف",forgotNeedEmail:"ابتدا ایمیل خود را در کادر بالا وارد کنید.",forgotSent:"اگر حسابی با این ایمیل وجود داشته باشد، پیوند بازنشانی در راه است."},
          ar: {title:"تسجيل الدخول",subtitle:"سجّل الدخول إلى حسابك",tabPassword:"البريد وكلمة المرور",tabPasskey:"مفتاح المرور",emailLabel:"البريد الإلكتروني",passwordLabel:"كلمة المرور",credsText:"متابعة",forgotBtn:"هل نسيت كلمة المرور؟",otpSentPre:"أرسلنا رمزًا من 6 أرقام إلى ",otpSentPost:". أدخله أدناه.",otpLabel:"رمز التحقق",otpText:"تحقّق وسجّل الدخول",backToCredsBtn:"← استخدام حساب آخر",btnText:"الدخول بمفتاح المرور",registerLink:"ليس لديك حساب؟ سجّل",resendBtn:"إعادة إرسال الرمز",resendSent:"إن انتهت صلاحية رمزك، أرسلنا رمزًا جديدًا.",forgotConfirmPre:"إرسال رابط إعادة التعيين إلى ",forgotConfirmPost:"؟",forgotSendBtn:"إرسال رابط إعادة التعيين",forgotCancel:"إلغاء",forgotNeedEmail:"أدخل بريدك الإلكتروني في الأعلى أولاً.",forgotSent:"إذا كان هناك حساب بهذا البريد، فإن رابط إعادة التعيين في طريقه إليك."},
          az: {title:"گیریش",subtitle:"حسابینیزا داخیل اولون",tabPassword:"ایمیل و پاروْل",tabPasskey:"گیریش آچاری",emailLabel:"ایمیل",passwordLabel:"پاروْل",credsText:"داوام",forgotBtn:"پاروْلونوزو اونوتموسونوز؟",otpSentPre:"بیر ۶ رقملی کد گؤنده‌ریلدی ",otpSentPost:". آلتدا داخیل ائدین.",otpLabel:"تأیید کدو",otpText:"تأیید و گیریش",backToCredsBtn:"← باشقا حساب ایشلَت",btnText:"گیریش آچاری ایله داخیل اول",registerLink:"حسابینیز یوخدور؟ قئیدیّاتدان کئچین",resendBtn:"کدو یئنیدن گؤنده‌ر",resendSent:"اگر کدینیز بیتیبسه، یئنی کد گؤنده‌ردیک.",forgotConfirmPre:"بازنشانی لینکی گؤنده‌ریلسین ",forgotConfirmPost:"؟",forgotSendBtn:"بازنشانی لینکی گؤنده‌ر",forgotCancel:"لغو",forgotNeedEmail:"اوّل یوخاریدا ایمیلینیزی داخیل ائدین.",forgotSent:"اگر بو ایمیل‌له بیر حساب اولسا، بازنشانی لینکی گؤنده‌ریله‌جک."},
          ku: {title:"چوونەژوورەوە",subtitle:"بچۆ ژوورەوە بۆ هەژمارەکەت",tabPassword:"ئیمەیل و وشەی نهێنی",tabPasskey:"کلیلی چوونەژوورەوە",emailLabel:"ئیمەیل",passwordLabel:"وشەی نهێنی",credsText:"بەردەوامبوون",forgotBtn:"وشەی نهێنیت لەبیرکردووە؟",otpSentPre:"کۆدێکی ٦ ژمارەییمان نارد بۆ ",otpSentPost:". لە خوارەوە بینووسە.",otpLabel:"کۆدی پشتڕاستکردنەوە",otpText:"پشتڕاستکردنەوە و چوونەژوورەوە",backToCredsBtn:"← هەژمارێکی تر بەکاربهێنە",btnText:"چوونەژوورەوە بە کلیل",registerLink:"هەژمارت نییە؟ خۆت تۆمار بکە",resendBtn:"کۆد دووبارە بنێرە",resendSent:"ئەگەر کۆدەکەت بەسەرچووە، کۆدێکی نوێمان نارد.",forgotConfirmPre:"ناردنی بەستەری ڕێکخستنەوە بۆ ",forgotConfirmPost:"؟",forgotSendBtn:"بەستەری ڕێکخستنەوە بنێرە",forgotCancel:"هەڵوەشاندنەوە",forgotNeedEmail:"سەرەتا ئیمەیلەکەت لە سەرەوە بنووسە.",forgotSent:"ئەگەر هەژمارێک بەم ئیمەیلە هەبێت، بەستەری ڕێکخستنەوە دەنێردرێت."},
          bal: {title:"درشُدگ",subtitle:"وتی حسابا درشُدگ کن",tabPassword:"ایمیل و رمز",tabPasskey:"درشُدگی کلید",emailLabel:"ایمیل",passwordLabel:"رمز",credsText:"دیمتر",forgotBtn:"وتی رمز شُمئے یاتا رفتگ؟",otpSentPre:"یک ۶ رقمی‌ین کد روان کرتگ ",otpSentPost:". اِئے را تہا نبیس کن.",otpLabel:"تصدیقی کد",otpText:"تصدیق و درشُدگ",backToCredsBtn:"← دگه حسابی استمال کن",btnText:"کلیدا درشُدگ",registerLink:"تئے حساب نیست؟ نام‌نویسی کن",resendBtn:"کدا دگه روان کن",resendSent:"اگر تئی کد سر بوتگ، نوکیں کدے روان کرتگ.",forgotConfirmPre:"بازنشانی لینک روان بہ ",forgotConfirmPost:"؟",forgotSendBtn:"بازنشانی لینک روان کن",forgotCancel:"لغو",forgotNeedEmail:"اول وتی ایمیلا بالا تہا نبیس کن.",forgotSent:"اگر اے ایمیلا حسابے ہست بیت، بازنشانی لینکے روان بیت."},
        };
        const RTL = ["fa","ar","az","ku","bal"];
        function currentLang() {
          const p = new URLSearchParams(location.search).get("lang");
          if (p && I18N[p]) { document.cookie = "ui_lang="+p+";path=/;max-age=31536000"; return p; }
          const c = (document.cookie.match(/ui_lang=([a-z]+)/)||[])[1];
          if (c && I18N[c]) return c;
          const n = (navigator.language||"en").split("-")[0];
          return I18N[n] ? n : "fa";
        }
        function applyI18n() {
          const lang = currentLang();
          const m = I18N[lang] || I18N.fa;
          document.documentElement.lang = lang;
          document.documentElement.dir = RTL.includes(lang) ? "rtl" : "ltr";
          for (const id in m) { const el = document.getElementById(id); if (el) el.textContent = m[id]; }
          const names = {en:"English",fa:"فارسی",ar:"العربية",az:"تۆرکجه",ku:"کوردی",bal:"بلۏچی"};
          const bar = document.getElementById("langBar");
          if (bar) bar.innerHTML = Object.keys(I18N).map(l => {
            if (l === lang) return `<b>${names[l]}</b>`;
            const u = new URL(location.href); u.searchParams.set("lang", l);
            return `<a href="${u.pathname}${u.search}" style="color:inherit">${names[l]}</a>`;
          }).join(" · ");
        }
        applyI18n();

        function getReturnUrl() {
            const params = new URLSearchParams(window.location.search);
            return params.get('returnUrl') || '/';
        }

        // Pass returnUrl to register link so after registration it comes back
        (function() {
            const returnUrl = getReturnUrl();
            if (returnUrl !== '/') {
                document.getElementById('registerLink').href =
                    '/register.html?returnUrl=' + encodeURIComponent(returnUrl);
            }
        })();

        const errorEl = document.getElementById('error');
        function showError(msg) {
            errorEl.textContent = msg;
            errorEl.className = 'error';
            errorEl.style.display = 'block';
        }
        function showNotice(msg) {
            errorEl.textContent = msg;
            errorEl.className = 'notice';
            errorEl.style.display = 'block';
        }
        function clearError() { errorEl.style.display = 'none'; }

        function switchTab(which) {
            clearError();
            document.getElementById('tabPassword').classList.toggle('active', which === 'password');
            document.getElementById('tabPasskey').classList.toggle('active', which === 'passkey');
            document.getElementById('panePassword').classList.toggle('hidden', which !== 'password');
            document.getElementById('panePasskey').classList.toggle('hidden', which !== 'passkey');
        }

        function setBusy(btn, spinner, busy) {
            btn.disabled = busy;
            spinner.style.display = busy ? 'inline-block' : 'none';
        }

        // ---- Email + password ----
        let pendingEmail = null;

        async function submitCreds() {
            clearError();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) { showError('Enter your email and password.'); return; }

            const btn = document.getElementById('credsBtn');
            setBusy(btn, document.getElementById('credsSpinner'), true);
            try {
                const res = await fetch('/api/password/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Sign in failed.');

                pendingEmail = email;
                document.getElementById('otpEmail').textContent = email;
                document.getElementById('stepCreds').classList.add('hidden');
                document.getElementById('stepOtp').classList.remove('hidden');
                document.getElementById('otp').focus();
            } catch (err) {
                showError(err.message || 'An unexpected error occurred.');
            } finally {
                setBusy(btn, document.getElementById('credsSpinner'), false);
            }
        }

        async function submitOtp() {
            clearError();
            const code = document.getElementById('otp').value.trim();
            if (code.length !== 6) { showError('Enter the 6-digit code.'); return; }

            const btn = document.getElementById('otpBtn');
            setBusy(btn, document.getElementById('otpSpinner'), true);
            try {
                const res = await fetch('/api/password/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Invalid code.');
                window.location.href = getReturnUrl();
            } catch (err) {
                showError(err.message || 'An unexpected error occurred.');
                setBusy(btn, document.getElementById('otpSpinner'), false);
            }
        }

        function backToCreds() {
            clearError();
            pendingEmail = null;
            document.getElementById('otp').value = '';
            document.getElementById('stepOtp').classList.add('hidden');
            document.getElementById('stepCreds').classList.remove('hidden');
        }

        async function resendOtp() {
            if (!pendingEmail) return;
            clearError();
            try {
                await fetch('/api/password/resend-otp', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail })
                });
            } catch { /* always succeed silently */ }
            showNotice((I18N[currentLang()]||I18N.fa).resendSent || 'A new code is on its way.');
        }

        // Step 1: clicking "Forgot your password?" reveals an explicit confirm
        // panel that names the target email (rather than sending silently).
        function forgotPassword() {
            clearError();
            const t = I18N[currentLang()] || I18N.fa;
            const email = document.getElementById('email').value.trim();
            if (!email) {
                showError(t.forgotNeedEmail || 'Enter your email above first.');
                document.getElementById('email').focus();
                return;
            }
            document.getElementById('forgotPrompt').textContent =
                (t.forgotConfirmPre || 'Send a reset link to ') + email + (t.forgotConfirmPost || '?');
            document.getElementById('forgotBtn').classList.add('hidden');
            document.getElementById('credsBtn').classList.add('hidden');
            document.getElementById('forgotConfirm').classList.remove('hidden');
        }

        // Step 2: actually request the reset, then show a (green) confirmation.
        async function sendForgot() {
            clearError();
            const t = I18N[currentLang()] || I18N.fa;
            const email = document.getElementById('email').value.trim();
            try {
                await fetch('/api/password/forgot', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
            } catch { /* always succeed silently — no account enumeration */ }
            document.getElementById('forgotConfirm').classList.add('hidden');
            document.getElementById('credsBtn').classList.remove('hidden');
            showNotice(t.forgotSent || 'If an account exists for that email, a reset link is on its way.');
        }

        function cancelForgot() {
            clearError();
            document.getElementById('forgotConfirm').classList.add('hidden');
            document.getElementById('forgotBtn').classList.remove('hidden');
            document.getElementById('credsBtn').classList.remove('hidden');
        }

        document.getElementById('password').addEventListener('keydown', e => { if (e.key === 'Enter') submitCreds(); });
        document.getElementById('otp').addEventListener('keydown', e => { if (e.key === 'Enter') submitOtp(); });

        // ---- Passkey (unchanged) ----
        function setLoading(loading) {
            const btn = document.getElementById('loginBtn');
            const spinner = document.getElementById('spinner');
            const text = document.getElementById('btnText');
            btn.disabled = loading;
            spinner.style.display = loading ? 'inline-block' : 'none';
            text.textContent = loading ? 'Authenticating...' : 'Sign in with Passkey';
        }

        async function startLogin() {
            clearError();
            setLoading(true);
            try {
                const beginRes = await fetch('/api/passkey/login/begin', { method: 'POST' });
                const beginData = await beginRes.json();
                if (!beginRes.ok) throw new Error(beginData.error || 'Failed to begin login');

                const assertionResponse = await startAuthentication({ optionsJSON: beginData.options });

                const completeRes = await fetch('/api/passkey/login/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ challengeId: beginData.challengeId, assertionResponse })
                });
                const completeData = await completeRes.json();
                if (!completeRes.ok) throw new Error(completeData.error || 'Login failed');

                window.location.href = getReturnUrl();
            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showError('Authentication was cancelled or not allowed.');
                } else {
                    showError(err.message || 'An unexpected error occurred.');
                }
                setLoading(false);
            }
        }
    </script>
</body>
</html>
