<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set your password — {{BrandName}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fafafa;
        }
        .card p {
            color: #a1a1aa;
            font-size: 0.875rem;
            margin-bottom: 1.5rem;
        }
        .field { text-align: start; margin-bottom: 1rem; }
        .field label { display: block; font-size: 0.8rem; color: #a1a1aa; margin-bottom: 0.35rem; }
        .field input {
            width: 100%;
            padding: 0.7rem 0.85rem;
            background: #0f0f12;
            border: 1px solid #27272a;
            border-radius: 8px;
            color: #fafafa;
            font-size: 0.95rem;
        }
        .field input:focus { outline: none; border-color: #3b82f6; }
        .hint { font-size: 0.75rem; color: #71717a; margin-top: 0.35rem; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #1e3a5f; cursor: not-allowed; }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success {
            background: #14532d;
            border: 1px solid #166534;
            color: #86efac;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff4;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Set your password</h1>
        <p id="subtitle">You've been invited. Choose a password to activate your account.</p>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <form id="form" onsubmit="return false;">
            <div class="field">
                <label for="password" id="lblPassword">Password</label>
                <input type="password" id="password" autocomplete="new-password" />
                <div class="hint" id="hint">At least 8 characters, including a letter and a number.</div>
            </div>
            <div class="field">
                <label for="confirm" id="lblConfirm">Confirm password</label>
                <input type="password" id="confirm" autocomplete="new-password" />
            </div>
            <button class="btn btn-primary" id="submitBtn" onclick="submitPassword()">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Set password & sign in</span>
            </button>
        </form>
    </div>

    <script>
        // i18n — keep in sync with the auth login/register pages.
        const I18N = {
            en: { title: 'Set your password', subtitle: "You've been invited. Choose a password to activate your account.",
                  lblPassword: 'Password', lblConfirm: 'Confirm password',
                  hint: 'At least 8 characters, including a letter and a number.',
                  btn: 'Set password & sign in', btnBusy: 'Setting…', ok: 'Password set. Redirecting…',
                  missing: 'Missing invitation link. Please use the link from your invite.',
                  mismatch: 'The passwords do not match.', weak: 'Password must be at least 8 characters and include a letter and a number.' },
            fa: { title: 'گذرواژه خود را تنظیم کنید', subtitle: 'شما دعوت شده‌اید. برای فعال‌سازی حساب، گذرواژه‌ای انتخاب کنید.',
                  lblPassword: 'گذرواژه', lblConfirm: 'تکرار گذرواژه',
                  hint: 'حداقل ۸ نویسه، شامل یک حرف و یک رقم.',
                  btn: 'تنظیم گذرواژه و ورود', btnBusy: 'در حال تنظیم…', ok: 'گذرواژه تنظیم شد. در حال انتقال…',
                  missing: 'پیوند دعوت یافت نشد. لطفاً از پیوند موجود در دعوت‌نامه استفاده کنید.',
                  mismatch: 'گذرواژه‌ها مطابقت ندارند.', weak: 'گذرواژه باید حداقل ۸ نویسه و شامل یک حرف و یک رقم باشد.' },
        };

        const params = new URLSearchParams(window.location.search);
        const handoff = params.get('handoff');
        const returnUrl = params.get('returnUrl') || '/';
        const lang = (params.get('lang') || document.documentElement.lang || 'en').slice(0, 2);
        const t = I18N[lang] || I18N.en;

        if (lang === 'fa') { document.documentElement.lang = 'fa'; document.documentElement.dir = 'rtl'; }

        for (const [id, key] of [['title','title'],['subtitle','subtitle'],['lblPassword','lblPassword'],
            ['lblConfirm','lblConfirm'],['hint','hint'],['btnText','btn']]) {
            const el = document.getElementById(id); if (el) el.textContent = t[key];
        }

        if (!handoff) {
            showError(t.missing);
            document.getElementById('submitBtn').disabled = true;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg; el.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }
        function setLoading(loading) {
            const btn = document.getElementById('submitBtn');
            btn.disabled = loading;
            document.getElementById('spinner').style.display = loading ? 'inline-block' : 'none';
            document.getElementById('btnText').textContent = loading ? t.btnBusy : t.btn;
        }

        function isAcceptable(pw) {
            return pw.length >= 8 && /[A-Za-z]/.test(pw) && /[0-9]/.test(pw);
        }

        async function submitPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            document.getElementById('error').style.display = 'none';

            if (!isAcceptable(password)) { showError(t.weak); return; }
            if (password !== confirm) { showError(t.mismatch); return; }

            setLoading(true);
            try {
                const res = await fetch('/api/password/invite-set', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ handoff, newPassword: password })
                });
                const data = await res.json().catch(() => ({}));
                if (!res.ok) throw new Error(data.error || 'Could not set the password.');

                showSuccess(t.ok);
                setTimeout(() => { window.location.href = returnUrl; }, 600);
            } catch (err) {
                showError(err.message || 'An unexpected error occurred.');
                setLoading(false);
            }
        }
    </script>
</body>
</html>
