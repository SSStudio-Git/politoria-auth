<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Pishro Auth</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fafafa;
        }
        .card p {
            color: #a1a1aa;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #1e3a5f; cursor: not-allowed; }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success {
            background: #14532d;
            border: 1px solid #166534;
            color: #86efac;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff4;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1>Register Your Passkey</h1>
        <p>You've been invited to HRMS. Register a passkey to activate your account.</p>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <button class="btn btn-primary" id="registerBtn" onclick="startRegister()">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Register passkey</span>
        </button>
    </div>

    <script src="https://unpkg.com/@simplewebauthn/browser@11/dist/bundle/index.umd.min.js"></script>
    <script>
        const { startRegistration } = SimpleWebAuthnBrowser;

        const params = new URLSearchParams(window.location.search);
        const handoff = params.get('handoff');
        const returnUrl = params.get('returnUrl') || '/';

        if (!handoff) {
            showError('Missing handoff token. Please go back to HRMS and try again.');
            document.getElementById('registerBtn').disabled = true;
        }

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function setLoading(loading) {
            const btn = document.getElementById('registerBtn');
            btn.disabled = loading;
            document.getElementById('spinner').style.display = loading ? 'inline-block' : 'none';
            document.getElementById('btnText').textContent = loading ? 'Registering...' : 'Register passkey';
        }

        async function startRegister() {
            document.getElementById('error').style.display = 'none';
            setLoading(true);

            try {
                const beginRes = await fetch('/api/passkey/invite/begin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ handoff })
                });
                const beginData = await beginRes.json();
                if (!beginRes.ok) throw new Error(beginData.error || 'Failed to begin registration');

                const attestationResponse = await startRegistration({ optionsJSON: beginData.options });

                const completeRes = await fetch('/api/passkey/register/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        challengeId: beginData.challengeId,
                        attestationResponse
                    })
                });
                const completeData = await completeRes.json();
                if (!completeRes.ok) throw new Error(completeData.error || 'Registration failed');

                showSuccess('Passkey registered. Redirecting...');
                setTimeout(() => { window.location.href = returnUrl; }, 600);
            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showError('Registration was cancelled.');
                } else {
                    showError(err.message || 'An unexpected error occurred.');
                }
                setLoading(false);
            }
        }
    </script>
</body>
</html>
