<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - {{BrandName}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .card h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #fafafa;
        }
        .card p {
            color: #a1a1aa;
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }
        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: #a1a1aa;
            margin-bottom: 0.375rem;
        }
        .input-group input {
            width: 100%;
            padding: 0.625rem 0.75rem;
            background: #09090b;
            border: 1px solid #27272a;
            border-radius: 6px;
            color: #fafafa;
            font-size: 0.9rem;
            outline: none;
        }
        .input-group input:focus { border-color: #3b82f6; }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #3b82f6;
            color: #fff;
        }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #1e3a5f; cursor: not-allowed; }
        .error {
            background: #7f1d1d;
            border: 1px solid #991b1b;
            color: #fca5a5;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .success {
            background: #14532d;
            border: 1px solid #166534;
            color: #86efac;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            display: none;
        }
        .link {
            display: block;
            margin-top: 1.5rem;
            color: #60a5fa;
            text-decoration: none;
            font-size: 0.875rem;
        }
        .link:hover { text-decoration: underline; }
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #fff4;
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Create Account</h1>
        <p id="subtitle">Register a passkey to create your account</p>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <div class="input-group">
            <label for="displayName" id="nameLabel">Display Name</label>
            <input type="text" id="displayName" placeholder="Enter your name" />
        </div>
        <button class="btn btn-primary" id="registerBtn" onclick="startRegister()">
            <span class="spinner" id="spinner"></span>
            <span id="btnText">Create account with Passkey</span>
        </button>
        <a id="loginLink" href="/login.html" class="link">Already have an account? Sign in</a>
        <div style="margin-top:18px;text-align:center;font-size:13px;opacity:.7" id="langBar"></div>
    </div>

    <script src="https://unpkg.com/@simplewebauthn/browser@11/dist/bundle/index.umd.min.js"></script>
    <script>
        const { startRegistration } = SimpleWebAuthnBrowser;

        const I18N = {
          en:{title:"Create Account",subtitle:"Register a passkey to create your account",nameLabel:"Display Name",namePlaceholder:"Enter your name",btnText:"Create account with Passkey",loginLink:"Already have an account? Sign in"},
          fa:{title:"ساخت حساب",subtitle:"برای ساخت حساب، یک کلید عبور ثبت کنید",nameLabel:"نام نمایشی",namePlaceholder:"نام خود را وارد کنید",btnText:"ساخت حساب با کلید عبور",loginLink:"حساب دارید؟ وارد شوید"},
          ar:{title:"إنشاء حساب",subtitle:"سجّل مفتاح مرور لإنشاء حسابك",nameLabel:"الاسم المعروض",namePlaceholder:"أدخل اسمك",btnText:"إنشاء حساب بمفتاح المرور",loginLink:"لديك حساب؟ سجّل الدخول"},
          az:{title:"حساب یارات",subtitle:"حساب یاراتماق اوچون بیر گیریش آچاری قئیدّیاتدان کئچیرین",nameLabel:"گؤرسه‌نن آد",namePlaceholder:"آدینیزی داخیل ائدین",btnText:"گیریش آچاری ایله حساب یارات",loginLink:"حسابینیز وار؟ داخیل اولون"},
          ku:{title:"دروستکردنی هەژمار",subtitle:"کلیلێکی چوونەژوورەوە تۆمار بکە بۆ دروستکردنی هەژمارەکەت",nameLabel:"ناوی پیشاندان",namePlaceholder:"ناوەکەت بنووسە",btnText:"دروستکردنی هەژمار بە کلیل",loginLink:"هەژمارت هەیە؟ بچۆ ژوورەوە"},
          bal:{title:"حساب جوڑ کن",subtitle:"وتی حسابئے جوڑ کنگ آ یک درشُدگی کلید ثبت کن",nameLabel:"نمائشی نام",namePlaceholder:"وتی نام نبیس کن",btnText:"کلیدا حساب جوڑ کن",loginLink:"تئے حساب هست؟ درشُدگ کن"},
        };
        const RTL = ["fa","ar","az","ku","bal"];
        function currentLang(){const p=new URLSearchParams(location.search).get("lang");if(p&&I18N[p]){document.cookie="ui_lang="+p+";path=/;max-age=31536000";return p;}const c=(document.cookie.match(/ui_lang=([a-z]+)/)||[])[1];if(c&&I18N[c])return c;const n=(navigator.language||"en").split("-")[0];return I18N[n]?n:"fa";}
        (function applyI18n(){const lang=currentLang();const m=I18N[lang]||I18N.fa;document.documentElement.lang=lang;document.documentElement.dir=RTL.includes(lang)?"rtl":"ltr";for(const id in m){if(id==="namePlaceholder")continue;const el=document.getElementById(id);if(el)el.textContent=m[id];}const np=document.getElementById("displayName");if(np)np.placeholder=m.namePlaceholder;const names={en:"English",fa:"فارسی",ar:"العربية",az:"تۆرکجه",ku:"کوردی",bal:"بلۏچی"};const bar=document.getElementById("langBar");if(bar)bar.innerHTML=Object.keys(I18N).map(l=>{if(l===lang)return "<b>"+names[l]+"</b>";const u=new URL(location.href);u.searchParams.set("lang",l);return '<a href="'+u.pathname+u.search+'" style="color:inherit">'+names[l]+"</a>";}).join(" · ");})();

        // Pass returnUrl to login link
        (function() {
            const returnUrl = new URLSearchParams(window.location.search).get('returnUrl');
            if (returnUrl) {
                document.getElementById('loginLink').href =
                    '/login.html?returnUrl=' + encodeURIComponent(returnUrl);
            }
        })();

        function showError(msg) {
            const el = document.getElementById('error');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(msg) {
            const el = document.getElementById('success');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function setLoading(loading) {
            const btn = document.getElementById('registerBtn');
            const spinner = document.getElementById('spinner');
            const text = document.getElementById('btnText');
            btn.disabled = loading;
            spinner.style.display = loading ? 'inline-block' : 'none';
            text.textContent = loading ? 'Registering...' : 'Create account with Passkey';
        }

        async function startRegister() {
            const errorEl = document.getElementById('error');
            errorEl.style.display = 'none';
            setLoading(true);

            const displayName = document.getElementById('displayName').value.trim();
            if (!displayName) {
                showError('Please enter a display name.');
                setLoading(false);
                return;
            }

            try {
                // Begin
                const beginRes = await fetch('/api/passkey/register/begin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ displayName })
                });
                const beginData = await beginRes.json();
                if (!beginRes.ok) throw new Error(beginData.error || 'Failed to begin registration');

                // WebAuthn
                const attestationResponse = await startRegistration({ optionsJSON: beginData.options });

                // Complete
                const completeRes = await fetch('/api/passkey/register/complete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        challengeId: beginData.challengeId,
                        attestationResponse
                    })
                });
                const completeData = await completeRes.json();
                if (!completeRes.ok) throw new Error(completeData.error || 'Registration failed');

                showSuccess('Account created! Redirecting...');
                const returnUrl = new URLSearchParams(window.location.search).get('returnUrl') || '/';
                setTimeout(() => { window.location.href = returnUrl; }, 800);
            } catch (err) {
                if (err.name === 'NotAllowedError') {
                    showError('Registration was cancelled or not allowed.');
                } else {
                    showError(err.message || 'An unexpected error occurred.');
                }
                setLoading(false);
            }
        }
    </script>
</body>
</html>
