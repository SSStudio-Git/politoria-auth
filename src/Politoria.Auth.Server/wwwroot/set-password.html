<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Your Password - {{BrandName}}</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #e4e4e7;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .card h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; color: #fafafa; }
        .card p.sub { color: #a1a1aa; font-size: 0.875rem; margin-bottom: 1.5rem; }
        .field { text-align: left; margin-bottom: 1rem; }
        .field label { display: block; font-size: 0.8rem; color: #a1a1aa; margin-bottom: 0.35rem; }
        .input {
            width: 100%;
            padding: 0.7rem 0.85rem;
            background: #0f0f14;
            border: 1px solid #27272a;
            border-radius: 8px;
            color: #fafafa;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.15s;
        }
        .input:focus { border-color: #3b82f6; }
        .hint { font-size: 0.75rem; color: #71717a; margin-top: 0.35rem; }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            width: 100%; padding: 0.75rem 1.5rem; border: none; border-radius: 8px;
            font-size: 0.95rem; font-weight: 500; cursor: pointer; transition: background 0.2s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-primary:disabled { background: #1e3a5f; cursor: not-allowed; }
        .error {
            background: #7f1d1d; border: 1px solid #991b1b; color: #fca5a5;
            padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem; display: none;
        }
        .success {
            background: #14532d; border: 1px solid #166534; color: #86efac;
            padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem; display: none;
        }
        .link { display: block; margin-top: 1.5rem; color: #60a5fa; text-decoration: none; font-size: 0.875rem; }
        .link:hover { text-decoration: underline; }
        .hidden { display: none !important; }
        .spinner {
            display: none; width: 18px; height: 18px; border: 2px solid #fff4;
            border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <h1 id="title">Set Your Password</h1>
        <p class="sub" id="subtitle">Choose a password for your account.</p>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div id="form">
            <div class="field">
                <label for="password" id="newPwLabel">New password</label>
                <input class="input" id="password" type="password" autocomplete="new-password" placeholder="••••••••">
                <p class="hint" id="pwHint">At least 8 characters.</p>
            </div>
            <div class="field">
                <label for="confirm" id="confirmLabel">Confirm password</label>
                <input class="input" id="confirm" type="password" autocomplete="new-password" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" id="submitBtn" onclick="submit()">
                <span class="spinner" id="spinner"></span>
                <span id="btnText">Set password</span>
            </button>
        </div>

        <a id="loginLink" class="link hidden" href="/login.html">Continue to sign in →</a>
        <div style="margin-top:18px;text-align:center;font-size:13px;opacity:.7" id="langBar"></div>
    </div>

    <script>
        const I18N = {
          en:{title:"Set Your Password",subtitle:"Choose a password for your account.",newPwLabel:"New password",pwHint:"At least 8 characters.",confirmLabel:"Confirm password",btnText:"Set password",loginLink:"Continue to sign in →"},
          fa:{title:"تعیین گذرواژه",subtitle:"برای حساب خود یک گذرواژه انتخاب کنید.",newPwLabel:"گذرواژه جدید",pwHint:"حداقل ۸ نویسه.",confirmLabel:"تأیید گذرواژه",btnText:"تعیین گذرواژه",loginLink:"ادامه به ورود →"},
          ar:{title:"تعيين كلمة المرور",subtitle:"اختر كلمة مرور لحسابك.",newPwLabel:"كلمة المرور الجديدة",pwHint:"8 أحرف على الأقل.",confirmLabel:"تأكيد كلمة المرور",btnText:"تعيين كلمة المرور",loginLink:"المتابعة لتسجيل الدخول →"},
          az:{title:"پاروْل تعیین ائت",subtitle:"حسابینیز اوچون بیر پاروْل سئچین.",newPwLabel:"یئنی پاروْل",pwHint:"ان آز ۸ حرف.",confirmLabel:"پاروْلو تأیید ائت",btnText:"پاروْل تعیین ائت",loginLink:"گیریشه داوام →"},
          ku:{title:"وشەی نهێنیت دابنێ",subtitle:"وشەیەکی نهێنی بۆ هەژمارەکەت هەڵبژێرە.",newPwLabel:"وشەی نهێنی نوێ",pwHint:"بەلایەنی کەم ٨ پیت.",confirmLabel:"دڵنیاکردنەوەی وشەی نهێنی",btnText:"وشەی نهێنی دابنێ",loginLink:"بەردەوامبە بۆ چوونەژوورەوە →"},
          bal:{title:"رمز تعیین کن",subtitle:"وتی حسابئے آ یک رمز گچین کن.",newPwLabel:"نوکین رمز",pwHint:"کم‌تر مه ۸ حرف.",confirmLabel:"رمزا تصدیق کن",btnText:"رمز تعیین کن",loginLink:"درشُدگا دیم بر →"},
        };
        const RTL = ["fa","ar","az","ku","bal"];
        function currentLang(){const p=new URLSearchParams(location.search).get("lang");if(p&&I18N[p]){document.cookie="ui_lang="+p+";path=/;max-age=31536000";return p;}const c=(document.cookie.match(/ui_lang=([a-z]+)/)||[])[1];if(c&&I18N[c])return c;const n=(navigator.language||"en").split("-")[0];return I18N[n]?n:"fa";}
        (function applyI18n(){const lang=currentLang();const m=I18N[lang]||I18N.fa;document.documentElement.lang=lang;document.documentElement.dir=RTL.includes(lang)?"rtl":"ltr";for(const id in m){const el=document.getElementById(id);if(el)el.textContent=m[id];}const names={en:"English",fa:"فارسی",ar:"العربية",az:"تۆرکجه",ku:"کوردی",bal:"بلۏچی"};const bar=document.getElementById("langBar");if(bar)bar.innerHTML=Object.keys(I18N).map(l=>{if(l===lang)return "<b>"+names[l]+"</b>";const u=new URL(location.href);u.searchParams.set("lang",l);return '<a href="'+u.pathname+u.search+'" style="color:inherit">'+names[l]+"</a>";}).join(" · ");})();

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const returnUrl = params.get('returnUrl');

        const errorEl = document.getElementById('error');
        const successEl = document.getElementById('success');

        function showError(msg) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
        function clearError() { errorEl.style.display = 'none'; }

        if (!token) {
            document.getElementById('form').classList.add('hidden');
            showError('This link is invalid or incomplete. Please request a new one.');
        }

        function setBusy(busy) {
            document.getElementById('submitBtn').disabled = busy;
            document.getElementById('spinner').style.display = busy ? 'inline-block' : 'none';
        }

        async function submit() {
            clearError();
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirm').value;
            if (password.length < 8) { showError('Password must be at least 8 characters.'); return; }
            if (password !== confirm) { showError('Passwords do not match.'); return; }

            setBusy(true);
            try {
                const res = await fetch('/api/password/set', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: password })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || 'Could not set your password.');

                document.getElementById('form').classList.add('hidden');
                successEl.textContent = 'Your password has been set. You can now sign in.';
                successEl.style.display = 'block';
                const link = document.getElementById('loginLink');
                if (returnUrl) link.href = '/login.html?returnUrl=' + encodeURIComponent(returnUrl);
                link.classList.remove('hidden');
            } catch (err) {
                showError(err.message || 'An unexpected error occurred.');
                setBusy(false);
            }
        }

        const confirmEl = document.getElementById('confirm');
        if (confirmEl) confirmEl.addEventListener('keydown', e => { if (e.key === 'Enter') submit(); });
    </script>
</body>
</html>
